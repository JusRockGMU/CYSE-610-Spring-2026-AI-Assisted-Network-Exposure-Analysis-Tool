<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Network Exposure Analysis{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🛡️ Network Vulnerability Scanner</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
                <a href="/monitor" class="{% if request.path == '/monitor' %}active{% endif %}" id="monitorNavLink">Monitor</a>
                <a href="/summary" class="{% if request.path.startswith('/summary') or request.path.startswith('/results') %}active{% endif %}" id="summaryNavLink">Summary</a>
                <a href="/history" class="{% if request.path == '/history' %}active{% endif %}">History</a>
                <a href="/status" class="{% if request.path == '/status' %}active{% endif %}">Status</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Network Vulnerability Scanner. All rights reserved.</p>
        </div>
    </footer>
    
    <script>
        // Update navigation links to point to most recent scans
        window.checkNavAvailability = async function() {
            const monitorLink = document.getElementById('monitorNavLink');
            const summaryLink = document.getElementById('summaryNavLink');
            
            try {
                const response = await fetch('/api/scans');
                const data = await response.json();
                const scans = data.scans || [];
                
                console.log('📊 Navigation check - scans:', scans.map(s => ({id: s.scan_id, status: s.status})));
                
                // Find most recent active scan (running or processing)
                const activeScan = scans.find(scan => 
                    scan.status.toLowerCase() === 'running' || 
                    scan.status.toLowerCase() === 'processing'
                );
                
                // Find most recent completed scan
                const completedScan = scans.find(scan => 
                    scan.status.toLowerCase() === 'complete'
                );
                
                // Find most recent scan overall (for monitor fallback)
                const mostRecentScan = scans[0];
                
                console.log('📊 activeScan:', activeScan?.scan_id, 'completedScan:', completedScan?.scan_id, 'mostRecent:', mostRecentScan?.scan_id);
                
                // Update Monitor link - prefer active scan, fallback to most recent
                if (monitorLink) {
                    const scanForMonitor = activeScan || mostRecentScan;
                    if (scanForMonitor) {
                        monitorLink.href = `/monitor?scan_id=${scanForMonitor.scan_id}`;
                        monitorLink.classList.remove('disabled');
                        monitorLink.title = activeScan ? 'View active scan' : 'View most recent scan';
                    } else {
                        monitorLink.href = '/monitor';
                        monitorLink.classList.add('disabled');
                        monitorLink.title = 'No scans available';
                    }
                }
                
                // Update Summary link - use most recent completed scan
                if (summaryLink) {
                    if (completedScan) {
                        summaryLink.href = `/results/${completedScan.scan_id}`;
                        summaryLink.classList.remove('disabled');
                        summaryLink.title = 'View latest results';
                    } else {
                        summaryLink.href = '/summary';
                        summaryLink.classList.add('disabled');
                        summaryLink.title = 'No completed scans';
                    }
                }
            } catch (error) {
                console.error('Failed to check scan status:', error);
            }
        };
        
        // Check on page load
        window.checkNavAvailability();
        
        // Re-check every 5 seconds
        setInterval(window.checkNavAvailability, 5000);
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
